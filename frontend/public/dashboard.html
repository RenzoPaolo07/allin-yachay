<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ALLIN YACHAY</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- html2pdf -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        * {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0f172a;
            --secondary: #1e293b;
            --accent: #3b82f6;
            --accent-light: #60a5fa;
            --accent-gradient: linear-gradient(135deg, #3b82f6, #8b5cf6);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --sidebar-width: 260px;
        }

        body {
            background: var(--primary);
            color: var(--text-light);
            overflow-x: hidden;
            transition: all 0.3s ease;
        }

        /* ============ SIDEBAR ============ */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: var(--sidebar-width);
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255,255,255,0.05);
            padding: 1.5rem 0;
            transition: all 0.3s;
            z-index: 1000;
            overflow-y: auto;
        }

        .sidebar::-webkit-scrollbar {
            width: 3px;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }

        .sidebar-brand {
            padding: 0 1.5rem 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 1.5rem;
        }

        .sidebar-brand a {
            font-size: 1.4rem;
            font-weight: 900;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-brand a i {
            color: var(--accent);
            font-size: 1.6rem;
        }

        .sidebar-brand a span {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-menu {
            padding: 0 0.8rem;
        }

        .sidebar-menu .menu-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            padding: 0 1rem;
            margin-bottom: 0.8rem;
            margin-top: 1.5rem;
            font-weight: 700;
        }

        .sidebar-menu .menu-label:first-of-type {
            margin-top: 0;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.7rem 1rem;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s;
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 2px;
            position: relative;
            cursor: pointer;
        }

        .sidebar-menu a:hover {
            background: rgba(255,255,255,0.05);
            color: white;
        }

        .sidebar-menu a.active {
            background: rgba(59, 130, 246, 0.15);
            color: white;
        }

        .sidebar-menu a.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 24px;
            background: var(--accent-gradient);
            border-radius: 0 4px 4px 0;
        }

        .sidebar-menu a i {
            width: 20px;
            text-align: center;
            font-size: 1rem;
        }

        .sidebar-menu a .badge-sidebar {
            margin-left: auto;
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            font-size: 0.65rem;
            padding: 0.2rem 0.6rem;
            border-radius: 50px;
            font-weight: 700;
        }

        .sidebar-footer {
            padding: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: 1rem;
        }

        .sidebar-footer .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-footer .user-card img {
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .sidebar-footer .user-card .user-info {
            flex: 1;
        }

        .sidebar-footer .user-card .user-info h6 {
            margin: 0;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .sidebar-footer .user-card .user-info span {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .sidebar-footer .user-card .online-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
        }

        /* ============ MAIN CONTENT ============ */
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 1.5rem 2rem;
            min-height: 100vh;
            transition: all 0.3s;
        }

        /* ============ TOPBAR ============ */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .topbar-left .toggle-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            display: none;
            padding: 0.5rem;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .topbar-left .toggle-btn:hover {
            background: rgba(255,255,255,0.05);
            color: white;
        }

        .topbar-left h4 {
            font-weight: 700;
            margin: 0;
        }

        .topbar-left h4 small {
            font-weight: 400;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .topbar-right .search-box {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 0.4rem 0.8rem;
            transition: all 0.3s;
        }

        .topbar-right .search-box:focus-within {
            border-color: var(--accent);
            background: rgba(255,255,255,0.08);
        }

        .topbar-right .search-box input {
            background: none;
            border: none;
            color: white;
            padding: 0.3rem 0.5rem;
            outline: none;
            width: 150px;
            font-size: 0.85rem;
        }

        .topbar-right .search-box input::placeholder {
            color: var(--text-muted);
        }

        .topbar-right .search-box i {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .topbar-right .notification-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: all 0.3s;
            position: relative;
            cursor: pointer;
        }

        .topbar-right .notification-btn:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .topbar-right .notification-btn .dot {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 8px;
            height: 8px;
            background: var(--danger);
            border-radius: 50%;
            border: 2px solid var(--primary);
        }

        /* ============ THEME TOGGLE ============ */
        .theme-toggle {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 50px;
            padding: 0.3rem 0.6rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .theme-toggle:hover {
            background: rgba(255,255,255,0.1);
        }

        .theme-toggle .toggle-track {
            width: 40px;
            height: 22px;
            background: rgba(255,255,255,0.2);
            border-radius: 50px;
            position: relative;
            transition: all 0.3s;
        }

        .theme-toggle .toggle-track .toggle-thumb {
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: all 0.3s;
        }

        body.light-mode .theme-toggle .toggle-track {
            background: rgba(0,0,0,0.2);
        }

        body.light-mode .theme-toggle .toggle-track .toggle-thumb {
            left: 20px;
        }

        .theme-toggle i {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* ============ GAMIFICATION BAR ============ */
        .gamification-bar {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 0.5rem 1.2rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .gamification-bar .level-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .gamification-bar .level-badge .level-icon {
            width: 40px;
            height: 40px;
            background: var(--accent-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 900;
            color: white;
        }

        .gamification-bar .level-badge .level-info {
            font-size: 0.8rem;
        }

        .gamification-bar .level-badge .level-info .level-number {
            font-weight: 900;
            font-size: 1.1rem;
        }

        .gamification-bar .level-badge .level-info .level-label {
            color: var(--text-muted);
        }

        .gamification-bar .points-display {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .gamification-bar .points-display i {
            color: #f59e0b;
            font-size: 1.3rem;
        }

        .gamification-bar .points-display .points-number {
            font-weight: 900;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .gamification-bar .points-display .points-label {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .gamification-bar .progress-container {
            flex: 1;
            min-width: 120px;
        }

        .gamification-bar .progress-container .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 0.2rem;
        }

        .gamification-bar .progress-container .progress-bar-gamification {
            height: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
        }

        .gamification-bar .progress-container .progress-bar-gamification .fill {
            height: 100%;
            background: var(--accent-gradient);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .gamification-bar .badges-display {
            display: flex;
            gap: 0.3rem;
        }

        .gamification-bar .badges-display .badge-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            border: 2px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
            cursor: default;
        }

        .gamification-bar .badges-display .badge-icon:hover {
            transform: scale(1.2);
            border-color: var(--accent);
        }

        .gamification-bar .badges-display .badge-icon.gold {
            background: rgba(245, 158, 11, 0.2);
            border-color: #f59e0b;
        }

        .gamification-bar .badges-display .badge-icon.silver {
            background: rgba(148, 163, 184, 0.2);
            border-color: #94a3b8;
        }

        .gamification-bar .badges-display .badge-icon.bronze {
            background: rgba(180, 83, 9, 0.2);
            border-color: #b45309;
        }

        .gamification-bar .badges-display .badge-icon.purple {
            background: rgba(139, 92, 246, 0.2);
            border-color: #8b5cf6;
        }

        .gamification-bar .badges-display .badge-icon:last-child {
            cursor: pointer;
        }

        /* ============ CONTENEDOR DE PÁGINAS ============ */
        .page-content {
            animation: fadeInPage 0.4s ease;
        }

        @keyframes fadeInPage {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse-audio {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ============ STATS CARDS ============ */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 1.5rem;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            border-radius: 20px 20px 0 0;
        }

        .stat-card.blue::before { background: var(--accent); }
        .stat-card.green::before { background: var(--success); }
        .stat-card.yellow::before { background: var(--warning); }
        .stat-card.red::before { background: var(--danger); }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
        }

        .stat-card .stat-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .stat-card .stat-top .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }

        .stat-card .stat-top .stat-icon.blue { background: rgba(59, 130, 246, 0.15); color: var(--accent); }
        .stat-card .stat-top .stat-icon.green { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .stat-card .stat-top .stat-icon.yellow { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
        .stat-card .stat-top .stat-icon.red { background: rgba(239, 68, 68, 0.15); color: var(--danger); }

        .stat-card .stat-number {
            font-size: 2.2rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 0.3rem;
        }

        .stat-card .stat-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* ============ CHARTS ============ */
        .charts-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .chart-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 1.5rem;
            transition: all 0.3s;
        }

        .chart-card:hover {
            border-color: rgba(255,255,255,0.1);
        }

        .chart-card .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .chart-card .chart-header h6 {
            font-weight: 700;
            margin: 0;
        }

        .chart-card canvas {
            max-height: 250px;
        }

        /* ============ TABLA ============ */
        .table-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 1.5rem;
        }

        .table-card .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .table-card .table-header h6 {
            font-weight: 700;
            margin: 0;
        }

        .table-card .table-responsive {
            overflow-x: auto;
        }

        .table-card table {
            width: 100%;
            border-collapse: collapse;
        }

        .table-card table th {
            text-align: left;
            padding: 0.8rem 0.5rem;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            font-weight: 700;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .table-card table td {
            padding: 0.8rem 0.5rem;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            vertical-align: middle;
        }

        .table-card table tr:hover td {
            background: rgba(255,255,255,0.02);
        }

        .status-badge {
            padding: 0.2rem 0.8rem;
            border-radius: 50px;
            font-size: 0.65rem;
            font-weight: 700;
            display: inline-block;
        }

        .status-badge.active { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .status-badge.riesgo { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
        .status-badge.abandono { background: rgba(239, 68, 68, 0.15); color: var(--danger); }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.75rem;
            color: white;
        }

        .user-avatar.blue { background: var(--accent); }
        .user-avatar.green { background: var(--success); }
        .user-avatar.yellow { background: var(--warning); }
        .user-avatar.red { background: var(--danger); }
        .user-avatar.purple { background: #8b5cf6; }

        .user-cell {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-cell .name {
            font-weight: 600;
            font-size: 0.85rem;
        }

        .user-cell .email {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        /* ============ PÁGINAS ESPECÍFICAS ============ */
        .page-header {
            margin-bottom: 2rem;
        }

        .page-header h3 {
            font-weight: 800;
        }

        .page-header p {
            color: var(--text-muted);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 4rem;
            opacity: 0.3;
            margin-bottom: 1rem;
        }

        .empty-state h5 {
            color: white;
            font-weight: 700;
        }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
        }

        .action-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }

        .action-card:hover {
            background: rgba(255,255,255,0.06);
            transform: translateY(-4px);
            border-color: rgba(59, 130, 246, 0.2);
        }

        .action-card i {
            font-size: 2rem;
            color: var(--accent-light);
            margin-bottom: 0.5rem;
        }

        .action-card h6 {
            font-weight: 700;
            font-size: 0.9rem;
        }

        .action-card p {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin: 0;
        }

        /* ============ CHAT ============ */
        .chat-container {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 1rem;
            min-height: 300px;
            max-height: 350px;
            overflow-y: auto;
            margin-bottom: 1rem;
        }

        .chat-message {
            padding: 0.6rem 1rem;
            border-radius: 12px;
            margin-bottom: 0.6rem;
            max-width: 85%;
            font-size: 0.9rem;
            animation: fadeInPage 0.3s ease;
        }

        .chat-message.user {
            background: rgba(59, 130, 246, 0.2);
            color: var(--text-light);
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .chat-message.bot {
            background: rgba(255,255,255,0.05);
            color: var(--text-light);
            border-bottom-left-radius: 4px;
        }

        .chat-input-group {
            display: flex;
            gap: 0.5rem;
        }

        .chat-input-group input {
            flex: 1;
            padding: 0.6rem 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            color: white;
            outline: none;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .chat-input-group input:focus {
            border-color: var(--accent);
            background: rgba(255,255,255,0.08);
        }

        .chat-input-group input::placeholder {
            color: var(--text-muted);
        }

        .chat-input-group button {
            padding: 0.6rem 1.2rem;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            transition: all 0.3s;
            cursor: pointer;
        }

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = 'http://localhost:3000/api';
    let permanenciaChart, riesgoChart;
    let synth = window.speechSynthesis;
    let utterance = null;
    let lastResponse = '';

    // ============ SIDEBAR TOGGLE ============
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const toggleBtn = document.getElementById('sidebarToggle');

    function toggleSidebar() {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('show');
        document.body.style.overflow = sidebar.classList.contains('open') ? 'hidden' : '';
    }

    toggleBtn.addEventListener('click', toggleSidebar);
    overlay.addEventListener('click', toggleSidebar);

    // ============ MODO OSCURO/CLARO ============
    function toggleTheme() {
        const body = document.body;
        const isLight = body.classList.toggle('light-mode');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
        
        body.style.transition = 'all 0.3s ease';
        
        const toggle = document.querySelector('.theme-toggle');
        if (toggle) {
            const sunIcon = toggle.querySelector('.fa-sun');
            const moonIcon = toggle.querySelector('.fa-moon');
            if (isLight) {
                sunIcon.style.color = '#f59e0b';
                moonIcon.style.color = '#94a3b8';
            } else {
                sunIcon.style.color = '#94a3b8';
                moonIcon.style.color = '#3b82f6';
            }
        }
    }

    function cargarTema() {
        const theme = localStorage.getItem('theme');
        if (theme === 'light') {
            document.body.classList.add('light-mode');
            const sunIcon = document.querySelector('.theme-toggle .fa-sun');
            const moonIcon = document.querySelector('.theme-toggle .fa-moon');
            if (sunIcon && moonIcon) {
                sunIcon.style.color = '#f59e0b';
                moonIcon.style.color = '#94a3b8';
            }
        }
    }

    // ============ TEXTO A VOZ ============
    function configurarVoz() {
        if (!synth) {
            console.warn('Web Speech API no soportada en este navegador');
            return false;
        }
        return true;
    }

    function leerEnVozAlta(texto) {
        if (!configurarVoz()) {
            Swal.fire({
                icon: 'warning',
                title: '⚠️ No soportado',
                text: 'Tu navegador no soporta texto a voz',
                background: '#0f172a',
                color: '#f8fafc',
                confirmButtonColor: '#3b82f6'
            });
            return;
        }
        
        if (synth.speaking) {
            synth.cancel();
        }
        
        utterance = new SpeechSynthesisUtterance(texto);
        utterance.lang = 'es-ES';
        utterance.rate = 0.9;
        utterance.pitch = 1;
        utterance.volume = 1;
        
        const voices = synth.getVoices();
        const spanishVoice = voices.find(voice => voice.lang.includes('es'));
        if (spanishVoice) {
            utterance.voice = spanishVoice;
        }
        
        utterance.onstart = () => {
            const btn = document.querySelector('[onclick="leerRespuesta()"]');
            if (btn) {
                btn.innerHTML = '<i class="fas fa-stop"></i>';
                btn.style.background = 'rgba(239, 68, 68, 0.2)';
                btn.style.borderColor = '#ef4444';
            }
            const chatContainer = document.getElementById('chatMessagesTutor');
            if (chatContainer) {
                const indicator = document.createElement('div');
                indicator.id = 'audioIndicator';
                indicator.style.cssText = `
                    text-align: center;
                    color: #3b82f6;
                    font-size: 0.8rem;
                    padding: 0.3rem;
                    animation: pulse-audio 1s infinite;
                `;
                indicator.innerHTML = '🔊 Reproduciendo...';
                chatContainer.appendChild(indicator);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        };
        
        utterance.onend = () => {
            const btn = document.querySelector('[onclick="leerRespuesta()"]');
            if (btn) {
                btn.innerHTML = '<i class="fas fa-volume-up"></i>';
                btn.style.background = '';
                btn.style.borderColor = '';
            }
            const indicator = document.getElementById('audioIndicator');
            if (indicator) indicator.remove();
        };
        
        utterance.onerror = (event) => {
            console.error('Error al reproducir:', event);
            const btn = document.querySelector('[onclick="leerRespuesta()"]');
            if (btn) {
                btn.innerHTML = '<i class="fas fa-volume-up"></i>';
                btn.style.background = '';
                btn.style.borderColor = '';
            }
            const indicator = document.getElementById('audioIndicator');
            if (indicator) indicator.remove();
        };
        
        synth.speak(utterance);
    }

    function detenerVoz() {
        if (synth && synth.speaking) {
            synth.cancel();
            const btn = document.querySelector('[onclick="leerRespuesta()"]');
            if (btn) {
                btn.innerHTML = '<i class="fas fa-volume-up"></i>';
                btn.style.background = '';
                btn.style.borderColor = '';
            }
            const indicator = document.getElementById('audioIndicator');
            if (indicator) indicator.remove();
        }
    }

    function leerRespuesta() {
        const chatContainer = document.getElementById('chatMessagesTutor');
        if (!chatContainer) return;
        
        const messages = chatContainer.querySelectorAll('.chat-message.bot');
        if (messages.length === 0) {
            Swal.fire({
                icon: 'info',
                title: 'Sin mensajes',
                text: 'No hay respuestas para leer',
                background: '#0f172a',
                color: '#f8fafc',
                timer: 2000,
                showConfirmButton: false
            });
            return;
        }
        
        const lastMessage = messages[messages.length - 1];
        let texto = lastMessage.textContent || '';
        texto = texto.replace(/[🤖]/g, '').trim();
        
        if (!texto) {
            Swal.fire({
                icon: 'info',
                title: 'Sin texto',
                text: 'No hay texto para leer',
                background: '#0f172a',
                color: '#f8fafc',
                timer: 2000,
                showConfirmButton: false
            });
            return;
        }
        
        leerEnVozAlta(texto);
    }

    if (window.speechSynthesis) {
        window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
        };
    }

    // ============ EXPORTAR A PDF ============
    function exportarPDF() {
        Swal.fire({
            title: 'Generando PDF...',
            text: 'Preparando el reporte de estadísticas',
            allowOutsideClick: false,
            didOpen: () => {
                Swal.showLoading();
            }
        });

        const contenido = document.createElement('div');
        contenido.style.padding = '40px';
        contenido.style.fontFamily = 'Arial, sans-serif';
        contenido.style.background = 'white';

    // ============ GAMIFICACIÓN ============
    function ganarPuntos(cantidad, accion) {
        const puntosElement = document.getElementById('puntosUsuario');
        if (!puntosElement) return;
        
        const puntosActuales = parseInt(puntosElement.textContent.replace(/,/g, ''));
        const nuevosPuntos = puntosActuales + cantidad;
        puntosElement.textContent = nuevosPuntos.toLocaleString();
        
        puntosElement.style.transform = 'scale(1.3)';
        puntosElement.style.color = '#f59e0b';
        setTimeout(() => {
            puntosElement.style.transform = 'scale(1)';
            puntosElement.style.color = '';
        }, 500);
        
        const progreso = document.getElementById('progresoNivel');
        const barra = document.getElementById('barraProgreso');
        if (progreso && barra) {
            let nuevoProgreso = parseInt(progreso.textContent) + (cantidad / 10);
            if (nuevoProgreso > 100) {
                nuevoProgreso = 0;
                const levelNumber = document.querySelector('.level-number');
                if (levelNumber) {
                    const nivelActual = parseInt(levelNumber.textContent.replace('Nivel ', ''));
                    levelNumber.textContent = `Nivel ${nivelActual + 1}`;
                    const levelLabel = document.querySelector('.level-label');
                    const labels = ['Novato', 'Aprendiz', 'Estudiante', 'Avanzado', 'Experto', 'Maestro', 'Élite', 'Leyenda'];
                    const nuevoLabel = labels[(nivelActual + 1) % labels.length] || 'Leyenda';
                    if (levelLabel) levelLabel.textContent = nuevoLabel;
                    
                    Swal.fire({
                        icon: 'success',
                        title: '🎉 ¡Subiste de Nivel!',
                        text: `¡Ahora eres ${nuevoLabel}!`,
                        background: '#0f172a',
                        color: '#f8fafc',
                        confirmButtonColor: '#3b82f6',
                        timer: 3000,
                        showConfirmButton: false
                    });
                }
            }
            progreso.textContent = `${Math.min(nuevoProgreso, 100)}%`;
            barra.style.width = `${Math.min(nuevoProgreso, 100)}%`;
        }
        
        // Actualizar ranking
        actualizarRanking('Renzo Quispe', cantidad);
    }

    // ============ FUNCIONES DE CARGA ============
    async function cargarDashboard() {
        try {
            const res = await fetch(`${API_URL}/dashboard`);
            const data = await res.json();
            if (data.success) {
                const d = data.data;
                document.getElementById('totalEstudiantes').textContent = d.total_estudiantes || '0';
                document.getElementById('estudiantesActivos').textContent = d.activos || '0';
                document.getElementById('estudiantesRiesgo').textContent = d.en_riesgo || '0';
                document.getElementById('abandonados').textContent = d.abandonaron || '0';
                actualizarGraficos(d);
                cargarEstudiantesTabla();
            }
        } catch {
            document.getElementById('totalEstudiantes').textContent = '1,250';
            document.getElementById('estudiantesActivos').textContent = '1,120';
            document.getElementById('estudiantesRiesgo').textContent = '95';
            document.getElementById('abandonados').textContent = '35';
            actualizarGraficos({ predicciones: { bajo_riesgo: 720, riesgo_medio: 285, alto_riesgo: 95 } });
            cargarEstudiantesTabla();
        }
    }

    function actualizarGraficos(data) {
        const ctx1 = document.getElementById('permanenciaChart')?.getContext('2d');
        if (ctx1) {
            if (permanenciaChart) permanenciaChart.destroy();
            permanenciaChart = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'],
                    datasets: [{
                        label: 'Tasa de Permanencia',
                        data: [78, 80, 82, 79, 83, 85, 84, 86, 88, 87, 89, 91],
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: '#3b82f6',
                        pointBorderColor: '#0f172a',
                        pointBorderWidth: 2,
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: false, min: 60, max: 100, grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#94a3b8', font: { size: 10 }, callback: v => v + '%' } },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 10 } } }
                    }
                }
            });
        }

        const ctx2 = document.getElementById('riesgoChart')?.getContext('2d');
        if (ctx2) {
            if (riesgoChart) riesgoChart.destroy();
            const pred = data.predicciones || { bajo_riesgo: 720, riesgo_medio: 285, alto_riesgo: 95 };
            riesgoChart = new Chart(ctx2, {
                type: 'doughnut',
                data: {

    function inicializarTutor() {
        const chat = document.getElementById('chatMessagesTutor');
        if (!chat) return;
        chat.innerHTML = `<div class="chat-message bot"><i class="fas fa-robot me-2"></i>¡Hola! Soy tu tutor IA. Pregúntame sobre cualquier tema académico.</div>`;
        
        document.getElementById('enviarPreguntaTutorBtn').addEventListener('click', () => enviarPreguntaTutor());
        document.getElementById('preguntaInputTutor').addEventListener('keypress', e => {
            if (e.key === 'Enter') enviarPreguntaTutor();
        });
    }

    async function enviarPreguntaTutor() {
        const input = document.getElementById('preguntaInputTutor');
        const chat = document.getElementById('chatMessagesTutor');
        const pregunta = input.value.trim();
        if (!pregunta) return;

        const userMsg = document.createElement('div');
        userMsg.className = 'chat-message user';
        userMsg.textContent = pregunta;
        chat.appendChild(userMsg);
        chat.scrollTop = chat.scrollHeight;
        input.value = '';

        const loading = document.createElement('div');
        loading.className = 'chat-message bot';
        loading.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Pensando...';
        chat.appendChild(loading);
        chat.scrollTop = chat.scrollHeight;

        try {
            const res = await fetch(`${API_URL}/tutor/preguntar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pregunta, curso: 'general', estudiante_id: 1 })
            });
            const data = await res.json();
            loading.remove();
            const respuesta = data.data?.respuesta || 'No entendí, intenta de nuevo.';
            const botMsg = document.createElement('div');
            botMsg.className = 'chat-message bot';
            botMsg.innerHTML = `<i class="fas fa-robot me-2"></i>${respuesta}`;
            chat.appendChild(botMsg);
            chat.scrollTop = chat.scrollHeight;
            
            lastResponse = respuesta;
            registrarAccion('pregunta');
            
            // Preguntar si quiere escuchar la respuesta
            Swal.fire({
                icon: 'question',
                title: '🔊 ¿Quieres escuchar la respuesta?',
                text: 'El tutor puede leerte la respuesta en voz alta',
                background: '#0f172a',
                color: '#f8fafc',
                showCancelButton: true,
                confirmButtonColor: '#3b82f6',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Sí, leer',
                cancelButtonText: 'No, gracias'
            }).then(result => {
                if (result.isConfirmed) {
                    leerEnVozAlta(respuesta);
                }
            });
            
        } catch {
            loading.remove();
            const errorMsg = document.createElement('div');
            errorMsg.className = 'chat-message bot';
            errorMsg.innerHTML = '❌ Error al conectar con el servidor.';
            chat.appendChild(errorMsg);
            chat.scrollTop = chat.scrollHeight;
        }
    }

    function preguntaTutor(p) {
        document.getElementById('preguntaInputTutor').value = p;

    }

            confirmButtonText: 'Sí, salir',
            cancelButtonText: 'Cancelar'
        }).then(result => {
            if (result.isConfirmed) {
                window.location.href = '/';
            }
        });
    }

    // ============ BUSCADOR ============
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('searchInput')?.addEventListener('input', function() {
            const query = this.value.toLowerCase();
            const rows = document.querySelectorAll('#estudiantesTableFull tr, #estudiantesTable tr');
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(query) ? '' : 'none';
            });
        });
    });

    // ============ KEYBOARD SHORTCUTS ============
    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.key === 'd') {
            e.preventDefault();
            toggleTheme();
        }
        if (e.altKey && e.key === 'g') {
            e.preventDefault();
            verInsignias();
        }
        if (e.ctrlKey && e.key === 'p') {
            e.preventDefault();
            exportarPDF();
        }
    });

    // ============ INICIALIZAR ============
    document.addEventListener('DOMContentLoaded', function() {
        cargarTema();
        navegarA('dashboard');
    });
</script>
</body>
</html>
