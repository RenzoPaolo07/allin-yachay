<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="app_nombre">ALLIN YACHAY - Idiomas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --accent-gradient: linear-gradient(135deg, #3b82f6, #8b5cf6);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
        }
        body { background: var(--primary); color: var(--text-light); min-height: 100vh; }
        .navbar-custom {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 0.8rem 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }
        .main-content { padding-top: 80px; padding-bottom: 2rem; }
        .card-module {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 1.5rem;
            transition: all 0.3s;
            height: 100%;
        }
        .card-module:hover { transform: translateY(-5px); border-color: rgba(59, 130, 246, 0.2); }
        .idioma-card {
            background: rgba(255,255,255,0.02);
            border: 2px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }
        .idioma-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            background: rgba(255,255,255,0.05);
        }
        .idioma-card.seleccionado {
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.1);
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.1);
        }
        .idioma-card .flag { font-size: 3rem; }
        .idioma-card .nombre { font-weight: 700; margin-top: 0.5rem; }
        .idioma-card .nativo { color: var(--text-muted); font-size: 0.85rem; }
        .idioma-card .badge-originario {
            display: inline-block;
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            padding: 0.2rem 0.8rem;
            border-radius: 50px;
            font-size: 0.6rem;
            font-weight: 700;
            margin-top: 0.5rem;
        }
        .btn-primary-custom {
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 700;
            transition: all 0.3s;
        }
        .btn-primary-custom:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(59, 130, 246, 0.4); color: white; }
        .btn-outline-custom {
            background: transparent;
            color: white;
            border: 2px solid rgba(255,255,255,0.15);
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 700;
            transition: all 0.3s;
        }
        .btn-outline-custom:hover { background: rgba(255,255,255,0.05); border-color: var(--accent); color: white; }
        @media (max-width: 768px) {
            .btn-primary-custom, .btn-outline-custom { width: 100%; justify-content: center; }
            .idioma-card .flag { font-size: 2rem; }
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container">
        <a class="navbar-brand" href="/" style="font-weight: 900; font-size: 1.6rem; color: white; text-decoration: none;">
            <i class="fas fa-graduation-cap" style="color: var(--accent);"></i>
            ALLIN <span style="background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">YACHAY</span>
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center gap-2">
                <li class="nav-item"><a class="nav-link" href="/dashboard" style="color: var(--text-muted); text-decoration: none;" data-i18n="nav_dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/mapa" style="color: var(--text-muted); text-decoration: none;" data-i18n="nav_modulos">Módulos</a></li>
                <li class="nav-item"><a class="nav-link" href="/idiomas" style="color: white; text-decoration: none; font-weight: 700;" data-i18n="nav_idiomas">Idiomas</a></li>
                <li class="nav-item"><a class="nav-link" href="/gemelo" style="color: var(--text-muted); text-decoration: none;" data-i18n="nav_demo">Demo</a></li>
                <li class="nav-item"><a class="btn btn-primary-custom" href="/dashboard" style="padding: 0.4rem 1.5rem; font-size: 0.85rem;">Dashboard</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- MAIN CONTENT -->
<div class="main-content">
    <div class="container">
        <!-- Header -->
        <div class="row mb-4">
            <div class="col-12">
                <h1 style="font-weight: 900; font-size: 2.5rem;">
                    <i class="fas fa-language" style="color: var(--accent);"></i>
                    <span style="background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;" data-i18n="nav_idiomas">Idiomas</span>
                </h1>
                <p class="text-muted" style="font-size: 1.1rem;" data-i18n="idiomas_selector">
                    Selecciona tu idioma y toda la página cambiará automáticamente
                </p>
            </div>
        </div>

        <!-- Selector de Idiomas -->
        <div class="row g-4 mb-4" id="idiomasGrid">
            <!-- Se carga con JS -->
        </div>

        <!-- Información del idioma seleccionado -->
        <div class="row">
            <div class="col-12">
                <div class="card-module">
                    <h5 class="mb-3">
                        <i class="fas fa-info-circle" style="color: var(--accent);"></i>
                        <span data-i18n="idiomas_selector">Idioma seleccionado</span>
                    </h5>
                    <div id="idiomaInfo" class="text-center py-3">
                        <span class="badge bg-primary p-3" style="font-size: 1.2rem;" id="idiomaActualLabel">🇪🇸 Español</span>
                    </div>
                    <div class="mt-3">
                        <button class="btn btn-success w-100" onclick="aplicarIdiomaGlobal()">
                            <i class="fas fa-globe me-2"></i>
                            <span data-i18n="accion_guardar">Aplicar a toda la página</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Vista previa de traducciones -->
        <div class="row mt-4">
            <div class="col-12">
                <div class="card-module">
                    <h5 class="mb-3">
                        <i class="fas fa-book" style="color: var(--warning);"></i>
                        <span data-i18n="demo_titulo">Vista previa de traducciones</span>
                    </h5>
                    <div id="traduccionesPreview" class="row g-2">
                        <!-- Se carga con JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ============ DATOS DE IDIOMAS ============
    const idiomasDisponibles = [
        { codigo: 'es', nombre: 'Español', flag: '🇪🇸', nativo: 'Español', originario: false },
        { codigo: 'qu', nombre: 'Quechua', flag: '🇵🇪', nativo: 'Runasimi', originario: true },
        { codigo: 'ay', nombre: 'Aymara', flag: '🇵🇪', nativo: 'Jaqi aru', originario: true },
        { codigo: 'as', nombre: 'Asháninka', flag: '🇵🇪', nativo: 'Ampari', originario: true },
        { codigo: 'en', nombre: 'English', flag: '🇬🇧', nativo: 'English', originario: false }
    ];

    let idiomaSeleccionado = localStorage.getItem('allin_idioma') || 'es';

    // ============ CARGAR IDIOMAS ============
    function cargarIdiomas() {
        const grid = document.getElementById('idiomasGrid');
        
        grid.innerHTML = idiomasDisponibles.map(idioma => `
            <div class="col-md-2 col-4">
                <div class="idioma-card ${idioma.codigo === idiomaSeleccionado ? 'seleccionado' : ''}" 
                     onclick="seleccionarIdioma('${idioma.codigo}')">
                    <div class="flag">${idioma.flag}</div>
                    <div class="nombre">${idioma.nombre}</div>
                    <div class="nativo">${idioma.nativo}</div>
                    ${idioma.originario ? '<div class="badge-originario">🌿 Lengua Originaria</div>' : ''}
                </div>
            </div>
        `).join('');

        // Actualizar label del idioma actual
        const actual = idiomasDisponibles.find(i => i.codigo === idiomaSeleccionado);
        document.getElementById('idiomaActualLabel').textContent = `${actual?.flag || '🇪🇸'} ${actual?.nombre || 'Español'}`;

        // Cargar vista previa de traducciones
        cargarVistaPrevia(idiomaSeleccionado);
    }

    // ============ SELECCIONAR IDIOMA ============
    function seleccionarIdioma(codigo) {
        idiomaSeleccionado = codigo;
        localStorage.setItem('allin_idioma', codigo);
        
        // Actualizar UI
        document.querySelectorAll('.idioma-card').forEach(card => card.classList.remove('seleccionado'));
        const cards = document.querySelectorAll('.idioma-card');
        const index = idiomasDisponibles.findIndex(i => i.codigo === codigo);
        if (cards[index]) cards[index].classList.add('seleccionado');

        // Actualizar label
        const actual = idiomasDisponibles.find(i => i.codigo === codigo);
        document.getElementById('idiomaActualLabel').textContent = `${actual?.flag || '🇪🇸'} ${actual?.nombre || 'Español'}`;

        // Cargar vista previa
        cargarVistaPrevia(codigo);

        // Notificación
        Swal.fire({
            icon: 'success',
            title: `Idioma cambiado a ${actual?.nombre || 'Español'}`,
            text: 'Haz clic en "Aplicar a toda la página" para ver los cambios',
            background: '#0f172a',
            color: '#f8fafc',
            confirmButtonColor: '#3b82f6',
            timer: 3000,
            showConfirmButton: false
        });
    }

    // ============ CARGAR VISTA PREVIA DE TRADUCCIONES ============
    async function cargarVistaPrevia(idioma) {
        try {
            const response = await fetch('/data/traducciones.json');
            if (!response.ok) throw new Error('No se pudo cargar el archivo');
            const data = await response.json();
            
            const traducciones = data[idioma]?.traducciones || {};
            const previewKeys = ['app_nombre', 'app_slogan', 'nav_inicio', 'nav_dashboard', 'dashboard_titulo', 'hero_titulo'];
            
            const container = document.getElementById('traduccionesPreview');
            container.innerHTML = previewKeys.map(clave => `
                <div class="col-md-4">
                    <div style="background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 0.8rem 1rem;">
                        <div style="font-size: 0.7rem; color: var(--text-muted);">${clave}</div>
                        <div style="font-weight: 700; font-size: 0.9rem;">${traducciones[clave] || '⚠️ Sin traducción'}</div>
                    </div>
                </div>
            `).join('');
        } catch (error) {
            console.error('Error cargando vista previa:', error);
            document.getElementById('traduccionesPreview').innerHTML = `
                <div class="col-12 text-center text-muted py-3">
                    <i class="fas fa-exclamation-circle"></i> Error al cargar traducciones
                </div>
            `;
        }
    }

    // ============ APLICAR IDIOMA A TODA LA PÁGINA ============
    function aplicarIdiomaGlobal() {
        // Usar el sistema i18n para aplicar el idioma
        if (typeof i18n !== 'undefined') {
            i18n.cambiarIdioma(idiomaSeleccionado);
            Swal.fire({
                icon: 'success',
                title: '✅ Idioma aplicado',
                text: 'Toda la página está ahora en el idioma seleccionado',
                background: '#0f172a',
                color: '#f8fafc',
                confirmButtonColor: '#3b82f6',
                timer: 3000,
                showConfirmButton: false
            });
            
            // Redirigir al dashboard para ver los cambios completos
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 1500);
        } else {
            // Fallback: guardar en localStorage y recargar
            localStorage.setItem('allin_idioma', idiomaSeleccionado);
            window.location.reload();
        }
    }

    // ============ INICIALIZAR ============
    document.addEventListener('DOMContentLoaded', function() {
        cargarIdiomas();
    });
</script>
</body>
</html>
